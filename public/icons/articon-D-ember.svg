  <rect x="19" y="54" width="11" height="4" rx="2" fill="#FCD34D" opacity="0.55"/>
  <rect x="19" y="64" width="9" height="4" rx="2" fill="#FCD34D" opacity="0.55"/>

  <!-- Text lines right page -->
  <rect x="79" y="44" width="11" height="4" rx="2" fill="#FCD34D" opacity="0.55"/>
  <rect x="79" y="54" width="11" height="4" rx="2" fill="#FCD34D" opacity="0.55"/>
  <rect x="79" y="64" width="9" height="4" rx="2" fill="#FCD34D" opacity="0.55"/>

  <!-- Star / AI spark — top right -->
  <polygon points="104,14 107,22 115,25 107,28 104,36 101,28 93,25 101,22" fill="#FB923C"/>
