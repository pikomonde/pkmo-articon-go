  <!-- Left page -->
  <rect x="14" y="30" width="40" height="66" rx="6" fill="none" stroke="#FCD34D" stroke-width="3"/>
  <line x1="34" y1="30" x2="34" y2="96" stroke="#FCD34D" stroke-width="2"/>

  <!-- Right page -->
  <rect x="74" y="30" width="40" height="66" rx="6" fill="none" stroke="#FCD34D" stroke-width="3"/>
  <line x1="94" y1="30" x2="94" y2="96" stroke="#FCD34D" stroke-width="2"/>

  <!-- Text lines left page -->
